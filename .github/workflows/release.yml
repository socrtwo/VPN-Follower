name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds installable artifacts for every supported platform and publishes
# them on a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/publish (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  id-token: write

jobs:
  # --- Universal pip package (works anywhere Python runs) ------------------
  python-dist:
    name: Python wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  # --- Web / ChromeOS / Android / iOS: the installable PWA ----------------
  web:
    name: Web app (PWA) bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip the PWA
        run: |
          cd vpnfollower
          zip -r ../vpnfollower-web-pwa.zip web
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: vpnfollower-web-pwa.zip

  # --- Native desktop binaries: Windows, macOS, Linux ---------------------
  # macOS builds a single universal2 binary (Intel + Apple Silicon) on the
  # Apple Silicon runner. GitHub's separate Intel `macos-13` runners are being
  # retired, so we no longer depend on them.
  desktop:
    name: Native binary (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    environment: release
    env:
      VPNF_TARGET_ARCH: ${{ matrix.target_arch }}
      ARCHIVE_ARCH: ${{ matrix.archive_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            name: Linux x86_64
          - os: macos-latest
            label: macos
            name: macOS universal2 (Intel + Apple Silicon)
            target_arch: universal2
            archive_arch: universal2
          - os: windows-latest
            label: windows
            name: Windows x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install + build
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .
          pyinstaller --clean -y packaging/vpnfollower.spec
      - name: Azure login (OIDC, no stored secret)
        if: runner.os == 'Windows' && vars.AZURE_TENANT_ID != ''
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binary with Azure Trusted Signing
        if: runner.os == 'Windows' && vars.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ vars.TS_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TS_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TS_CERT_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Verify macOS architectures
        if: runner.os == 'macOS'
        run: |
          echo "Built slices:"
          lipo -archs dist/vpnfollower
          lipo -archs dist/vpnfollower | grep -q x86_64
          lipo -archs dist/vpnfollower | grep -q arm64
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          ARCH="${ARCHIVE_ARCH:-$(uname -m)}"
          tar czf "../vpnfollower-${{ matrix.label }}-${ARCH}.tar.gz" vpnfollower
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/vpnfollower.exe -DestinationPath "vpnfollower-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            vpnfollower-*.tar.gz
            vpnfollower-*.zip

  # --- Collect everything and publish the GitHub Release ------------------
  release:
    name: Publish GitHub Release
    needs: [python-dist, web, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: VPN-Follower ${{ github.event.inputs.tag || github.ref_name }}
          files: release/*
          generate_release_notes: true
          body_path: packaging/RELEASE_NOTES.md
          fail_on_unmatched_files: false
